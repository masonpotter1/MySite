<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@450;550;650;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#071014" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta
      name="description"
      content="Mason Potter — software engineer portfolio, CloutSites business systems, projects, experience, and travel log. One site: Home, CloutSites, and Mason."
    />
    <meta property="og:title" content="Mason Potter | Portfolio & CloutSites" />
    <meta
      property="og:description"
      content="Portfolio for recruiters and visitors, plus CloutSites enterprise modernization—React, TypeScript, and Vite."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <% if (VITE_SITE_URL) { %>
    <link rel="canonical" href="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta name="twitter:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <meta name="twitter:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <% } %>
    <script type="application/ld+json"><%- organizationJsonLd %></script>
    <title>Mason Potter | Portfolio & CloutSites</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
