<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c141c" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta
      name="description"
      content="Mason Potter is a full-stack software engineer with past Paycom ATS work at scale, independent consulting through CloutSites, and a portfolio spanning data, web, mobile, and travel."
    />
    <meta property="og:title" content="Mason Potter | Software Developer" />
    <meta
      property="og:description"
      content="A modern portfolio and digital passport for Mason Potter: enterprise-scale engineering background, independent consulting, tinkering projects, and travel chapters."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <% if (VITE_SITE_URL) { %>
    <link rel="canonical" href="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta name="twitter:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <meta name="twitter:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <% } %>
    <script type="application/ld+json"><%- personJsonLd %></script>
    <title>Mason Potter | Software Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
