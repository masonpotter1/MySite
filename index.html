<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c141c" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta
      name="description"
      content="Mason Potter—software engineer with enterprise ATS experience at scale (Paycom), independent consulting (CloutSites), healthcare web modernization, and projects across full-stack, data, and mobile. Portfolio, résumé, and travel log."
    />
    <meta property="og:title" content="Mason Potter | Software Engineer & Portfolio" />
    <meta
      property="og:description"
      content="Portfolio for recruiters and visitors: engineering highlights, projects, experience, skills, interests, and a travel log—built with React and TypeScript."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <% if (VITE_SITE_URL) { %>
    <link rel="canonical" href="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta name="twitter:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <meta name="twitter:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <% } %>
    <script type="application/ld+json"><%- personJsonLd %></script>
    <title>Mason Potter | Software Engineer · Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
