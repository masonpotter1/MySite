<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071014" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta
      name="description"
      content="Cloutsites builds full-lifecycle digital systems for Oklahoma businesses: OKC custom software, cloud consulting, legacy modernization, React web apps, Laravel builds, QA automation, and observability."
    />
    <meta
      name="keywords"
      content="OKC Custom Software, Oklahoma Cloud Consulting, Full-Stack Development Oklahoma City, legacy modernization Oklahoma, React development Oklahoma City"
    />
    <meta property="og:title" content="Cloutsites | Oklahoma Custom Software & Cloud Consulting" />
    <meta
      property="og:description"
      content="Enterprise modernization and high-performance web application development for Oklahoma businesses."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <% if (VITE_SITE_URL) { %>
    <link rel="canonical" href="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta name="twitter:url" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/" />
    <meta property="og:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <meta name="twitter:image" content="<%= VITE_SITE_URL.replace(/\/$/, '') %>/og-image.png" />
    <% } %>
    <script type="application/ld+json"><%- organizationJsonLd %></script>
    <title>Cloutsites | Oklahoma Custom Software & Cloud Consulting</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
